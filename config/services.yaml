# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    trailer.video.real_for_first_scene_only: false
services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # Trailer project persistence (file-based)
    App\Application\Trailer\Port\TrailerProjectRepositoryInterface:
        alias: App\Infrastructure\Trailer\Persistence\FileTrailerProjectRepository

    App\Infrastructure\Trailer\Persistence\FileTrailerProjectRepository:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Trailer artifact storage (local filesystem)
    App\Application\Trailer\Port\ArtifactStorageInterface:
        alias: App\Infrastructure\Trailer\Storage\LocalArtifactStorage

    App\Application\Trailer\Port\TrailerProjectSetupInterface:
        alias: App\Infrastructure\Trailer\Storage\LocalArtifactStorage

    # Fake voice/video providers for MVP (no external AI APIs)
    App\Application\Trailer\Port\VoiceGenerationProviderInterface:
        alias: App\Infrastructure\Trailer\Provider\FakeVoiceGenerationProvider

    # Scene-aware video provider: keeps fake as default, optionally routes scene 1 to a real provider.
    App\Application\Trailer\Port\VideoGenerationProviderInterface:
        alias: App\Application\Trailer\Service\SceneAwareVideoGenerationProvider

    App\Application\Trailer\Service\SceneAwareVideoGenerationProvider:
        arguments:
            $fakeProvider: '@App\Infrastructure\Trailer\Provider\FakeVideoGenerationProvider'
            # Define App\Infrastructure\Trailer\Provider\RealVideoGenerationProvider when ready;
            # until then this stays null and everything uses the fake provider.
            $realProvider: '@?App\Infrastructure\Trailer\Provider\RealVideoGenerationProvider'
            $useRealForFirstSceneOnly: '%trailer.video.real_for_first_scene_only%'

    App\Application\Trailer\Port\TrailerRendererInterface:
        alias: App\Infrastructure\Trailer\Rendering\ManifestTrailerRenderer

    App\Infrastructure\Trailer\Storage\TrailerPathResolver:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
