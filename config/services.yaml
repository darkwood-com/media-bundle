# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    trailer.video.real_for_first_scene_only: true

    # Replicate video provider configuration (env-driven)
    # Secrets (API token) must be provided via real env or .env.local files.
    trailer.video.replicate.enabled: '%env(bool:default::TRAILER_VIDEO_REPLICATE_ENABLED)%'
    trailer.video.replicate.api_token: '%env(string:default::TRAILER_VIDEO_REPLICATE_API_TOKEN)%'
    trailer.video.replicate.model: '%env(string:default::TRAILER_VIDEO_REPLICATE_MODEL)%'
    trailer.video.replicate.default_preset: '%env(string:default::TRAILER_VIDEO_REPLICATE_DEFAULT_PRESET)%'
    trailer.video.replicate.poll_interval_seconds: '%env(int:default::TRAILER_VIDEO_REPLICATE_POLL_INTERVAL_SECONDS)%'
    trailer.video.replicate.max_attempts: '%env(int:default::TRAILER_VIDEO_REPLICATE_MAX_ATTEMPTS)%'
    trailer.video.replicate.poll_timeout_seconds: '%env(int:default::TRAILER_VIDEO_REPLICATE_POLL_TIMEOUT_SECONDS)%'

    # Replicate voice (TTS) — reuses API token; enable alongside scene-1 real video if desired.
    trailer.voice.replicate.enabled: '%env(bool:default::TRAILER_VOICE_REPLICATE_ENABLED)%'
    trailer.voice.replicate.model: '%env(string:default::TRAILER_VOICE_REPLICATE_MODEL)%'
    trailer.voice.replicate.voice_id: '%env(string:default::TRAILER_VOICE_REPLICATE_VOICE_ID)%'
    trailer.voice.replicate.audio_format: '%env(string:default::TRAILER_VOICE_REPLICATE_AUDIO_FORMAT)%'

    replicate.api.base_url: 'https://api.replicate.com/v1'
services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # Trailer project persistence (file-based)
    App\Application\Trailer\Port\TrailerProjectRepositoryInterface:
        alias: App\Infrastructure\Trailer\Persistence\FileTrailerProjectRepository

    App\Infrastructure\Trailer\Persistence\FileTrailerProjectRepository:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Trailer artifact storage (local filesystem)
    App\Application\Trailer\Port\ArtifactStorageInterface:
        alias: App\Infrastructure\Trailer\Storage\LocalArtifactStorage

    App\Application\Trailer\Port\TrailerProjectSetupInterface:
        alias: App\Infrastructure\Trailer\Storage\LocalArtifactStorage

    # Voice: fake by default; scene 1 can use Replicate TTS when enabled (see SceneAwareVoiceGenerationProvider).
    App\Application\Trailer\Port\VoiceGenerationProviderInterface:
        alias: App\Application\Trailer\Service\SceneAwareVoiceGenerationProvider

    App\Application\Trailer\Service\SceneAwareVoiceGenerationProvider:
        arguments:
            $fakeProvider: '@App\Infrastructure\Trailer\Provider\FakeVoiceGenerationProvider'
            $realProvider: '@?App\Infrastructure\Trailer\Provider\ReplicateVoiceGenerationProvider'
            $useRealForFirstSceneOnly: '%trailer.video.real_for_first_scene_only%'

    # Scene-aware video provider: keeps fake as default, optionally routes scene 1 to a real provider.
    App\Application\Trailer\Port\VideoGenerationProviderInterface:
        alias: App\Application\Trailer\Service\SceneAwareVideoGenerationProvider

    App\Application\Trailer\Service\SceneAwareVideoGenerationProvider:
        arguments:
            $fakeProvider: '@App\Infrastructure\Trailer\Provider\FakeVideoGenerationProvider'
            # Optionally route the first scene to a real provider backed by Replicate.
            $realProvider: '@?App\Infrastructure\Trailer\Provider\ReplicateVideoGenerationProvider'
            $useRealForFirstSceneOnly: '%trailer.video.real_for_first_scene_only%'

    # Scene-1 video benchmark: call Replicate directly so a failed API call is not masked by the router’s fake fallback.
    App\Application\Trailer\Service\SceneVideoBenchmarkService:
        arguments:
            $videoProvider: '@App\Infrastructure\Trailer\Provider\ReplicateVideoGenerationProvider'

    App\Infrastructure\Trailer\Provider\Replicate\ReplicateVoiceProviderConfig:
        arguments:
            $enabled: '%trailer.voice.replicate.enabled%'
            $model: '%trailer.voice.replicate.model%'
            $voiceId: '%trailer.voice.replicate.voice_id%'
            $audioFormat: '%trailer.voice.replicate.audio_format%'
            $pollIntervalSeconds: '%trailer.video.replicate.poll_interval_seconds%'
            $maxAttempts: '%trailer.video.replicate.max_attempts%'
            $maxPollDurationSeconds: '%trailer.video.replicate.poll_timeout_seconds%'

    # Shared Replicate HTTP config (token + base URL; used by video and voice)
    App\Infrastructure\Trailer\Provider\Replicate\ReplicateApiConfig:
        arguments:
            $apiToken: '%trailer.video.replicate.api_token%'
            $baseUrl: '%replicate.api.base_url%'

    App\Infrastructure\Trailer\Provider\Replicate\ReplicateClient:
        arguments:
            $httpClient: '@http_client'

    App\Infrastructure\Trailer\Provider\Replicate\ReplicateVideoProviderConfig:
        arguments:
            $enabled: '%trailer.video.replicate.enabled%'
            $model: '%trailer.video.replicate.model%'
            $defaultPreset: '%trailer.video.replicate.default_preset%'
            $pollIntervalSeconds: '%trailer.video.replicate.poll_interval_seconds%'
            $maxAttempts: '%trailer.video.replicate.max_attempts%'
            $maxPollDurationSeconds: '%trailer.video.replicate.poll_timeout_seconds%'

    App\Application\Trailer\Port\TrailerRendererInterface:
        alias: App\Infrastructure\Trailer\Rendering\ManifestTrailerRenderer

    App\Infrastructure\Trailer\Storage\TrailerPathResolver:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
